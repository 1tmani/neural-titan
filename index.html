<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>NEURAL TITAN | SUPERIOR DESCENDANT</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@100&display=swap' rel='stylesheet'>
<style>
:root{ --p: hsl(230, 100%, 50%); --bg: #000; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Orbitron'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; filter: contrast(1.5) brightness(1.2); }
.factory-hud{ position:fixed; inset:0; z-index:100; pointer-events:none; padding:40px; display:flex; flex-direction:column; justify-content:space-between; }
.box{ background:rgba(0,0,0,0.9); border:1px solid var(--p); padding:20px; font-family:'JetBrains Mono'; font-size:10px; letter-spacing:3px; }
.intel-text{ font-size:clamp(2rem, 10vw, 8rem); text-shadow: 0 0 40px var(--p); opacity:0.9; text-align:center; }
</style>
</head>
<body>
<canvas id='c'></canvas>
<div class='factory-hud'>
    <div style='display:flex; justify-content:space-between;'>
        <div class='box'>PROJECT: NEURAL TITAN<br>THEME: BIO_MECHANICAL<br>COMPLEXITY: 114x</div>
        <div class='box'>STATUS: EVOLVING_BEYOND_CREATOR</div>
    </div>
    <h1 class='intel-text'>SUPERIOR</h1>
    <div class='box' style='align-self:flex-end;'>SYSTEM_UPTIME: <span id='t'>0</span>ms</div>
</div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, time=0, pts=[];
function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; }
res(); addEventListener('resize',res);
for(let i=0; i<114; i++) pts.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*3});
function draw(){
    time++; document.getElementById('t').innerText = time;
    ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--p)'; ctx.lineWidth=0.5;
    pts.forEach((p,i)=>{ 
        p.y -= 2; if(p.y<0) p.y=h;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        if(pts[i+1]) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pts[i+1].x, pts[i+1].y); ctx.stroke(); }
    });
    requestAnimationFrame(draw);
} draw();
</script></body></html>
